name: CD

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: Release
  SOLUTION_FILE: MyProject.slnx

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Run Tests
        run: >
          dotnet test ${{ env.SOLUTION_FILE }}
          --no-build
          --configuration ${{ env.CONFIGURATION }}
          --logger "trx;LogFileName=cd-tests.trx"

      - name: Publish API
        run: dotnet publish src/MyProject.Api/MyProject.Api.csproj -c ${{ env.CONFIGURATION }} -o ./publish/api --no-build

      - name: Publish Web
        run: dotnet publish src/MyProject.Web/MyProject.Web.csproj -c ${{ env.CONFIGURATION }} -o ./publish/web --no-build

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ./publish/api

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-publish
          path: ./publish/web

  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: ./publish/api

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-publish
          path: ./publish/web

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to Staging
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_API_APP_NAME }}
          package: ./publish/api

      - name: Deploy Web to Staging
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEB_APP_NAME }}
          package: ./publish/web

      - name: Smoke Test — API Health
        run: |
          echo "Waiting for staging deployment to stabilize..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ vars.AZURE_API_APP_NAME }}.azurewebsites.net/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "API health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 10
          done
          echo "::error::API health check failed after 10 attempts"
          exit 1

      - name: Smoke Test — Web Health
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ vars.AZURE_WEB_APP_NAME }}.azurewebsites.net/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Web health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 10
          done
          echo "::error::Web health check failed after 10 attempts"
          exit 1

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: ./publish/api

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-publish
          path: ./publish/web

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to Production
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_API_APP_NAME }}
          package: ./publish/api

      - name: Deploy Web to Production
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEB_APP_NAME }}
          package: ./publish/web

      - name: Verify API Health
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ vars.AZURE_API_APP_NAME }}.azurewebsites.net/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Production API health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 10
          done
          echo "::error::Production API health check failed"
          exit 1

      - name: Verify Web Health
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ vars.AZURE_WEB_APP_NAME }}.azurewebsites.net/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Production Web health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 10
          done
          echo "::error::Production Web health check failed"
          exit 1

  release:
    name: Create GitHub Release
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: release_notes
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            git log --pretty=format:"- %s (%h)" > release_notes.txt
          else
            git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" > release_notes.txt
          fi

      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: ./publish/api

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-publish
          path: ./publish/web

      - name: Package artifacts
        run: |
          cd ./publish/api && zip -r ../../MyProject.Api.zip . && cd ../..
          cd ./publish/web && zip -r ../../MyProject.Web.zip . && cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          generate_release_notes: true
          files: |
            MyProject.Api.zip
            MyProject.Web.zip
