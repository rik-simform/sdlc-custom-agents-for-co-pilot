name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: Release
  SOLUTION_FILE: MyProject.slnx

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} --no-restore --configuration ${{ env.CONFIGURATION }} -warnaserrors

      - name: Run Unit Tests
        run: >
          dotnet test ${{ env.SOLUTION_FILE }}
          --no-build
          --configuration ${{ env.CONFIGURATION }}
          --filter "TestCategory!=Integration&TestCategory!=E2E"
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=unit-tests.trx"
          --results-directory ./TestResults

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: '**/unit-tests.trx'
          reporter: dotnet-trx

      - name: Upload Code Coverage
        uses: codecov/codecov-action@v4
        with:
          files: '**/coverage.cobertura.xml'
          fail_ci_if_error: false

      - name: Upload build artifacts (API)
        if: github.ref == 'refs/heads/main'
        run: dotnet publish src/MyProject.Api/MyProject.Api.csproj -c ${{ env.CONFIGURATION }} -o ./artifacts/api --no-build

      - name: Upload build artifacts (Web)
        if: github.ref == 'refs/heads/main'
        run: dotnet publish src/MyProject.Web/MyProject.Web.csproj -c ${{ env.CONFIGURATION }} -o ./artifacts/web --no-build

      - name: Upload API artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ./artifacts/api
          retention-days: 7

      - name: Upload Web artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: web-publish
          path: ./artifacts/web
          retention-days: 7

  security-scan:
    name: Security Scan (CodeQL)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build for CodeQL
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration ${{ env.CONFIGURATION }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  vulnerability-check:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Check for vulnerable packages
        run: dotnet list ${{ env.SOLUTION_FILE }} package --vulnerable --include-transitive 2>&1 | tee vulnerable-packages.txt

      - name: Fail on critical vulnerabilities
        run: |
          if grep -qi "critical" vulnerable-packages.txt; then
            echo "::error::Critical vulnerabilities found in NuGet packages"
            exit 1
          fi
